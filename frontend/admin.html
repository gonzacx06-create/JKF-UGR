<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración - Jornadas UGR</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* Estilos específicos para el panel */
    .admin-wrapper {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    .admin-header h1 {
      font-family: var(--font-display);
      color: #fff;
      font-size: 28px;
    }
    .admin-header .btn-volver {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      transition: background 0.2s;
    }
    .admin-header .btn-volver:hover {
      background: var(--surface2);
      color: var(--text);
    }
    .filtros {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
      background: var(--surface);
      padding: 16px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .filtros input,
    .filtros select,
    .filtros button {
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-body);
    }
    .filtros input:focus,
    .filtros select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .filtros button {
      background: var(--accent);
      color: #0d1117;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .filtros button:hover {
      opacity: 0.85;
    }
    .filtros .btn-exportar {
      background: var(--azul-ugr);
      color: #fff;
    }
    .filtros .btn-exportar:hover {
      background: var(--azul-ugr-claro);
    }
    .tabla-container {
      overflow-x: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 0 16px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table th {
      background: var(--surface2);
      color: var(--text-dim);
      font-weight: 600;
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
      vertical-align: middle;
    }
    table tr:hover td {
      background: rgba(255,255,255,0.02);
    }
    table .estado-escaneado {
      color: var(--verde);
      font-weight: 600;
    }
    table .estado-no-escaneado {
      color: var(--accent);
      font-weight: 600;
    }
    .acciones {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .acciones button {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .acciones button:hover {
      opacity: 0.8;
    }
    .btn-toggle {
      background: var(--azul-ugr);
      color: #fff;
    }
    .btn-toggle.escaneado {
      background: var(--verde);
    }
    .btn-eliminar {
      background: var(--rojo-ugr);
      color: #fff;
    }
    .btn-editar {
      background: var(--accent);
      color: #0d1117;
    }
    .paginacion {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      flex-wrap: wrap;
    }
    .paginacion button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .paginacion button:hover {
      background: var(--surface2);
    }
    .paginacion button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .paginacion span {
      color: var(--text-dim);
      font-size: 13px;
    }
    .mensaje {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin: 12px 0;
      display: none;
    }
    .mensaje.exito {
      background: rgba(129,199,132,0.12);
      border: 1px solid rgba(129,199,132,0.3);
      color: var(--verde);
      display: block;
    }
    .mensaje.error {
      background: rgba(239,83,80,0.12);
      border: 1px solid rgba(239,83,80,0.3);
      color: var(--accent4);
      display: block;
    }
    .cargando {
      text-align: center;
      color: var(--text-dim);
      padding: 40px;
    }

    /* ===== LOGIN ===== */
    .login-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
    }
    .login-container h2 {
      font-family: var(--font-display);
      color: #fff;
      margin-bottom: 20px;
    }
    .login-container input {
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
    }
    .login-container input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .login-container button {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-container button:hover {
      opacity: 0.85;
    }
    .login-container .error-msg {
      color: var(--accent4);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ===== MODAL ===== */
    #modal-editar-charla {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    #modal-editar-charla .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    #modal-editar-charla h3 {
      font-family: var(--font-display);
      color: #fff;
      margin-bottom: 16px;
    }
    #modal-editar-charla .form-group {
      margin-bottom: 14px;
    }
    #modal-editar-charla label {
      display: block;
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 4px;
    }
    #modal-editar-charla input {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
    }
    #modal-editar-charla input:focus {
      outline: none;
      border-color: var(--accent);
    }
    #modal-editar-charla .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    #modal-editar-charla .btn-cancelar {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    #modal-editar-charla .btn-cancelar:hover {
      background: var(--surface);
    }
    #modal-editar-charla .btn-guardar {
      background: var(--accent);
      color: #0d1117;
      border: none;
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 700;
    }
    #modal-editar-charla .btn-guardar:hover {
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      .filtros { flex-direction: column; }
      .admin-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <!-- ===== LOGIN ===== -->
  <div id="login-container" class="login-container">
    <h2>🔐 Panel de Administración</h2>
    <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 20px;">Ingresa tus credenciales para acceder</p>
    <input type="text" id="login-usuario" placeholder="Usuario" autocomplete="off" />
    <input type="password" id="login-password" placeholder="Contraseña" autocomplete="new-password" />
    <div id="login-error" class="error-msg">❌ Usuario o contraseña incorrectos</div>
    <button id="btn-login">Ingresar</button>
  </div>

  <!-- ===== PANEL DE ADMINISTRACIÓN ===== -->
  <div id="admin-content" style="display:none;">
    <div class="admin-wrapper">
      <!-- Header -->
      <div class="admin-header">
        <h1>🔐 Panel de Administración</h1>
        <div>
          <a href="/" class="btn-volver">← Volver al inicio</a>
          <button id="btn-logout" style="margin-left:10px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;">Cerrar sesión</button>
        </div>
      </div>

      <!-- Mensaje de autenticación -->
      <div id="auth-message" class="mensaje"></div>

      <!-- Filtros -->
      <div class="filtros">
        <input type="text" id="filtro-email" placeholder="Buscar por email..." />
        <select id="filtro-charla">
          <option value="">Todas las charlas</option>
        </select>
        <select id="filtro-escaneado">
          <option value="">Todos</option>
          <option value="true">Escaneados</option>
          <option value="false">No escaneados</option>
        </select>
        <button id="btn-filtrar">🔍 Buscar</button>
        <button id="btn-exportar" class="btn-exportar">📥 Exportar CSV</button>
        <button id="btn-limpiar" style="background: var(--surface2); color: var(--text-dim);">Limpiar filtros</button>
      </div>

      <!-- Tabla de inscripciones -->
      <div class="tabla-container">
        <div id="tabla-cargando" class="cargando">Cargando inscripciones...</div>
        <div id="tabla-contenido" style="display:none;">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Charla</th>
                <th>Día</th>
                <th>Hora</th>
                <th>Código</th>
                <th>Escaneado</th>
                <th>Fecha inscripción</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-body">
            </tbody>
          </table>
          <!-- Paginación -->
          <div class="paginacion" id="paginacion-container">
            <button id="btn-anterior" disabled>Anterior</button>
            <span id="info-pagina">Página 1 de 1</span>
            <button id="btn-siguiente" disabled>Siguiente</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL DE EDICIÓN ===== -->
  <div id="modal-editar-charla">
    <div class="modal-content">
      <h3>✏️ Editar Charla</h3>
      <form id="form-editar-charla">
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label for="edit-titulo">Título *</label>
          <input type="text" id="edit-titulo" required placeholder="Ej: Conferencia Inaugural" />
        </div>
        <div class="form-group">
          <label for="edit-dia">Día *</label>
          <input type="text" id="edit-dia" required placeholder="Ej: Miércoles 2" />
        </div>
        <div class="form-group">
          <label for="edit-hora">Hora *</label>
          <input type="text" id="edit-hora" required placeholder="Ej: 10:00 - 11:30" />
        </div>
        <div class="form-group">
          <label for="edit-ponente">Ponente *</label>
          <input type="text" id="edit-ponente" required placeholder="Ej: Dr. Luis Miguel Torres" />
        </div>
        <div class="form-group">
          <label for="edit-cupo">Cupo máximo *</label>
          <input type="number" id="edit-cupo" required min="1" placeholder="Ej: 40" />
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn-cancelar" id="btn-cancelar-modal">Cancelar</button>
          <button type="submit" class="btn-guardar">Guardar cambios</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ============================================
      // CONFIGURACIÓN
      // ============================================
      let paginaActual = 1;
      const limite = 20;
      let totalPaginas = 1;
      let tokenActual = localStorage.getItem('adminToken') || null;

      // Elementos DOM
      const loginContainer = document.getElementById('login-container');
      const adminContent = document.getElementById('admin-content');
      const loginUsuario = document.getElementById('login-usuario');
      const loginPassword = document.getElementById('login-password');
      const loginError = document.getElementById('login-error');
      const btnLogin = document.getElementById('btn-login');
      const btnLogout = document.getElementById('btn-logout');

      const tablaBody = document.getElementById('tabla-body');
      const tablaCargando = document.getElementById('tabla-cargando');
      const tablaContenido = document.getElementById('tabla-contenido');
      const filtroEmail = document.getElementById('filtro-email');
      const filtroCharla = document.getElementById('filtro-charla');
      const filtroEscaneado = document.getElementById('filtro-escaneado');
      const btnFiltrar = document.getElementById('btn-filtrar');
      const btnExportar = document.getElementById('btn-exportar');
      const btnLimpiar = document.getElementById('btn-limpiar');
      const btnAnterior = document.getElementById('btn-anterior');
      const btnSiguiente = document.getElementById('btn-siguiente');
      const infoPagina = document.getElementById('info-pagina');
      const authMessage = document.getElementById('auth-message');

      // Elementos del modal
      const modal = document.getElementById('modal-editar-charla');
      const formEditar = document.getElementById('form-editar-charla');
      const editId = document.getElementById('edit-id');
      const editTitulo = document.getElementById('edit-titulo');
      const editDia = document.getElementById('edit-dia');
      const editHora = document.getElementById('edit-hora');
      const editPonente = document.getElementById('edit-ponente');
      const editCupo = document.getElementById('edit-cupo');
      const btnCancelarModal = document.getElementById('btn-cancelar-modal');

      // ============================================
      // FUNCIONES DE AUTENTICACIÓN
      // ============================================
      function mostrarLogin() {
        loginContainer.style.display = 'block';
        adminContent.style.display = 'none';
        tokenActual = null;
        localStorage.removeItem('adminToken');
        loginError.style.display = 'none';
      }

      function mostrarPanel() {
        loginContainer.style.display = 'none';
        adminContent.style.display = 'block';
        cargarCharlasFiltro();
        cargarInscripciones(1);
      }

      // ============================================
      // FUNCIONES AUXILIARES
      // ============================================
      function mostrarMensaje(texto, tipo) {
        authMessage.textContent = texto;
        authMessage.className = 'mensaje ' + tipo;
        setTimeout(() => {
          authMessage.className = 'mensaje';
        }, 5000);
      }

      function obtenerHeaders() {
        return {
          'Authorization': `Bearer ${tokenActual}`,
          'Content-Type': 'application/json'
        };
      }

      // ============================================
      // LOGIN
      // ============================================
      btnLogin.addEventListener('click', async function() {
        const username = loginUsuario.value.trim();
        const password = loginPassword.value.trim();

        if (!username || !password) {
          loginError.textContent = '❌ Usuario y contraseña requeridos';
          loginError.style.display = 'block';
          return;
        }

        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const data = await res.json();
          if (!res.ok) {
            loginError.textContent = '❌ ' + (data.error || 'Credenciales incorrectas');
            loginError.style.display = 'block';
            return;
          }
          tokenActual = data.token;
          localStorage.setItem('adminToken', tokenActual);
          loginError.style.display = 'none';
          mostrarPanel();
        } catch (err) {
          loginError.textContent = '❌ Error de conexión con el servidor';
          loginError.style.display = 'block';
          console.error(err);
        }
      });

      loginPassword.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btnLogin.click();
      });

      // ============================================
      // LOGOUT
      // ============================================
      btnLogout.addEventListener('click', function() {
        mostrarLogin();
      });

      // ============================================
      // CARGAR CHARLAS PARA FILTRO
      // ============================================
      async function cargarCharlasFiltro() {
        try {
          const res = await fetch('/api/admin/charlas', { headers: obtenerHeaders() });
          if (!res.ok) {
            if (res.status === 401 || res.status === 403) {
              mostrarMensaje('❌ Sesión expirada. Vuelve a iniciar sesión.', 'error');
              mostrarLogin();
              return;
            }
            throw new Error('Error al cargar charlas');
          }
          const data = await res.json();
          filtroCharla.innerHTML = '<option value="">Todas las charlas</option>';
          data.forEach(ch => {
            const opt = document.createElement('option');
            opt.value = ch.id;
            opt.textContent = ch.titulo;
            filtroCharla.appendChild(opt);
          });
        } catch (err) {
          console.error('Error cargando charlas para filtro:', err);
          mostrarMensaje('❌ Error al cargar charlas para el filtro.', 'error');
        }
      }

      // ============================================
      // CARGAR INSCRIPCIONES
      // ============================================
      async function cargarInscripciones(page = 1) {
        paginaActual = page;
        tablaCargando.style.display = 'block';
        tablaContenido.style.display = 'none';

        const email = filtroEmail.value.trim();
        const charla_id = filtroCharla.value;
        const escaneado = filtroEscaneado.value;

        let url = `/api/admin/inscripciones?page=${page}&limit=${limite}`;
        if (email) url += `&email=${encodeURIComponent(email)}`;
        if (charla_id) url += `&charla_id=${charla_id}`;
        if (escaneado !== '') url += `&escaneado=${escaneado}`;

        try {
          const res = await fetch(url, { headers: obtenerHeaders() });
          if (!res.ok) {
            if (res.status === 401 || res.status === 403) {
              mostrarMensaje('❌ Sesión expirada. Vuelve a iniciar sesión.', 'error');
              mostrarLogin();
              return;
            }
            throw new Error('Error al cargar inscripciones');
          }
          const data = await res.json();
          const inscripciones = data.data || [];
          const pagination = data.pagination || { total: 0, page: 1, totalPages: 1 };

          totalPaginas = pagination.totalPages || 1;
          renderizarTabla(inscripciones);
          actualizarPaginacion(pagination);

          tablaCargando.style.display = 'none';
          tablaContenido.style.display = 'block';
        } catch (err) {
          console.error('Error:', err);
          mostrarMensaje('❌ Error al cargar inscripciones: ' + err.message, 'error');
          tablaCargando.style.display = 'none';
        }
      }

      // ============================================
      // RENDERIZAR TABLA (con botón Editar)
      // ============================================
      function renderizarTabla(inscripciones) {
        if (inscripciones.length === 0) {
          tablaBody.innerHTML = `<tr><td colspan="10" style="text-align:center;padding:30px;color:var(--text-dim);">No hay inscripciones que coincidan con los filtros.</td></tr>`;
          return;
        }

        tablaBody.innerHTML = '';
        inscripciones.forEach(ins => {
          const tr = document.createElement('tr');
          const escaneadoClass = ins.escaneado ? 'estado-escaneado' : 'estado-no-escaneado';
          const escaneadoText = ins.escaneado ? '✅ Sí' : '❌ No';

          tr.innerHTML = `
            <td>${ins.id}</td>
            <td><strong>${ins.nombre}</strong></td>
            <td>${ins.email}</td>
            <td>${ins.charla_titulo}</td>
            <td>${ins.dia}</td>
            <td>${ins.hora}</td>
            <td><code style="background:var(--bg);padding:2px 6px;border-radius:4px;font-size:11px;">${ins.codigo}</code></td>
            <td class="${escaneadoClass}">${escaneadoText}</td>
            <td style="font-size:11px;">${ins.fecha_inscripcion}</td>
            <td>
              <div class="acciones">
                <button class="btn-editar" data-id="${ins.id}" data-charla-titulo="${ins.charla_titulo}" data-dia="${ins.dia}" data-hora="${ins.hora}" data-ponente="${ins.ponente}">✏️ Editar</button>
                <button class="btn-toggle ${ins.escaneado ? 'escaneado' : ''}" data-id="${ins.id}" data-escaneado="${ins.escaneado}">
                  ${ins.escaneado ? 'Desmarcar' : 'Marcar'}
                </button>
                <button class="btn-eliminar" data-id="${ins.id}">Eliminar</button>
              </div>
            </td>
          `;
          tablaBody.appendChild(tr);
        });

        // Eventos: Toggle escaneado
        document.querySelectorAll('.btn-toggle').forEach(btn => {
          btn.addEventListener('click', async function(e) {
            const id = this.dataset.id;
            const actual = this.dataset.escaneado === 'true';
            await toggleEscaneado(id, !actual);
          });
        });

        // Eventos: Eliminar
        document.querySelectorAll('.btn-eliminar').forEach(btn => {
          btn.addEventListener('click', async function(e) {
            const id = this.dataset.id;
            if (confirm('¿Estás seguro de eliminar esta inscripción?')) {
              await eliminarInscripcion(id);
            }
          });
        });

        // Eventos: Editar
        document.querySelectorAll('.btn-editar').forEach(btn => {
          btn.addEventListener('click', function(e) {
            const id = parseInt(this.dataset.id);
            const titulo = this.dataset.charlaTitulo;
            const dia = this.dataset.dia;
            const hora = this.dataset.hora;
            const ponente = this.dataset.ponente;
            abrirModalEdicion(id, titulo, dia, hora, ponente);
          });
        });
      }

      // ============================================
      // MODAL DE EDICIÓN
      // ============================================
      function abrirModalEdicion(id, titulo, dia, hora, ponente) {
        // Cargar datos completos desde la API para obtener el cupo_maximo
        fetch(`/api/admin/charlas/${id}`, { headers: obtenerHeaders() })
          .then(res => {
            if (!res.ok) throw new Error('Error al cargar datos de la charla');
            return res.json();
          })
          .then(data => {
            editId.value = data.id;
            editTitulo.value = data.titulo;
            editDia.value = data.dia;
            editHora.value = data.hora;
            editPonente.value = data.ponente;
            editCupo.value = data.cupo_maximo;
            modal.style.display = 'flex';
          })
          .catch(err => {
            console.error('Error cargando charla:', err);
            mostrarMensaje('❌ Error al cargar los datos de la charla', 'error');
          });
      }

      function cerrarModal() {
        modal.style.display = 'none';
        formEditar.reset();
      }

      btnCancelarModal.addEventListener('click', cerrarModal);

      // Cerrar modal al hacer clic fuera del contenido
      modal.addEventListener('click', function(e) {
        if (e.target === modal) cerrarModal();
      });

      // Enviar formulario de edición
      formEditar.addEventListener('submit', async function(e) {
        e.preventDefault();

        const id = editId.value;
        const payload = {
          titulo: editTitulo.value.trim(),
          dia: editDia.value.trim(),
          hora: editHora.value.trim(),
          ponente: editPonente.value.trim(),
          cupo_maximo: parseInt(editCupo.value)
        };

        try {
          const res = await fetch(`/api/admin/charlas/${id}`, {
            method: 'PUT',
            headers: obtenerHeaders(),
            body: JSON.stringify(payload)
          });
          if (!res.ok) {
            const errData = await res.json();
            throw new Error(errData.error || 'Error al actualizar');
          }
          mostrarMensaje('✅ Charla actualizada correctamente', 'exito');
          cerrarModal();
          cargarInscripciones(paginaActual);
        } catch (err) {
          console.error('Error actualizando charla:', err);
          mostrarMensaje('❌ Error al actualizar: ' + err.message, 'error');
        }
      });

      // ============================================
      // PAGINACIÓN
      // ============================================
      function actualizarPaginacion(pagination) {
        const { page, totalPages } = pagination;
        infoPagina.textContent = `Página ${page} de ${totalPages}`;
        btnAnterior.disabled = page <= 1;
        btnSiguiente.disabled = page >= totalPages;
        btnAnterior.onclick = () => cargarInscripciones(page - 1);
        btnSiguiente.onclick = () => cargarInscripciones(page + 1);
      }

      // ============================================
      // ACCIONES: TOGGLE ESCANEADO
      // ============================================
      async function toggleEscaneado(id, nuevoEstado) {
        try {
          const res = await fetch(`/api/admin/inscripciones/${id}/escaneado`, {
            method: 'PUT',
            headers: obtenerHeaders(),
            body: JSON.stringify({ escaneado: nuevoEstado })
          });
          if (!res.ok) {
            if (res.status === 401 || res.status === 403) {
              mostrarMensaje('❌ Sesión expirada. Vuelve a iniciar sesión.', 'error');
              mostrarLogin();
              return;
            }
            throw new Error('Error al actualizar');
          }
          mostrarMensaje('✅ Estado de escaneo actualizado', 'exito');
          cargarInscripciones(paginaActual);
        } catch (err) {
          console.error(err);
          mostrarMensaje('❌ Error al actualizar', 'error');
        }
      }

      // ============================================
      // ACCIONES: ELIMINAR
      // ============================================
      async function eliminarInscripcion(id) {
        try {
          const res = await fetch(`/api/admin/inscripciones/${id}`, {
            method: 'DELETE',
            headers: obtenerHeaders()
          });
          if (!res.ok) {
            if (res.status === 401 || res.status === 403) {
              mostrarMensaje('❌ Sesión expirada. Vuelve a iniciar sesión.', 'error');
              mostrarLogin();
              return;
            }
            throw new Error('Error al eliminar');
          }
          mostrarMensaje('✅ Inscripción eliminada', 'exito');
          cargarInscripciones(paginaActual);
        } catch (err) {
          console.error(err);
          mostrarMensaje('❌ Error al eliminar', 'error');
        }
      }

      // ============================================
      // EXPORTAR CSV
      // ============================================
      async function exportarCSV() {
        try {
          const res = await fetch('/api/admin/exportar-csv', {
            headers: obtenerHeaders()
          });
          if (!res.ok) {
            if (res.status === 401 || res.status === 403) {
              mostrarMensaje('❌ Sesión expirada. Vuelve a iniciar sesión.', 'error');
              mostrarLogin();
              return;
            }
            if (res.status === 404) {
              mostrarMensaje('⚠️ No hay inscripciones para exportar', 'error');
              return;
            }
            throw new Error('Error al exportar');
          }
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `inscripciones-${new Date().toISOString().split('T')[0]}.csv`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
          mostrarMensaje('✅ Exportación exitosa', 'exito');
        } catch (err) {
          console.error(err);
          mostrarMensaje('❌ Error al exportar', 'error');
        }
      }

      // ============================================
      // EVENTOS
      // ============================================
      btnFiltrar.addEventListener('click', () => cargarInscripciones(1));
      btnExportar.addEventListener('click', exportarCSV);
      btnLimpiar.addEventListener('click', () => {
        filtroEmail.value = '';
        filtroCharla.value = '';
        filtroEscaneado.value = '';
        cargarInscripciones(1);
      });

      filtroEmail.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btnFiltrar.click();
      });

      // ============================================
      // INICIALIZACIÓN
      // ============================================
      if (tokenActual) {
        mostrarPanel();
      } else {
        mostrarLogin();
      }

      console.log('🔐 Panel de administración con edición de charlas');
    })();
  </script>
</body>
</html>
